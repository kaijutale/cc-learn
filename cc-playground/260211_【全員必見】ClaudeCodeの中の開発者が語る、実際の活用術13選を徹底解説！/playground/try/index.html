<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boris Cherny's 23 Moves - Claude Code活用術</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #1a1a1a;
        --bg-secondary: #0d0d0d;
        --bg-terminal: #111111;
        --bg-card: #1e1e1e;
        --bg-code: #0a0a0a;
        --text-primary: #e5e5e5;
        --text-secondary: #888888;
        --text-muted: #555555;
        --accent: #e07a41;
        --accent-light: rgba(224, 122, 65, 0.12);
        --accent-dim: rgba(224, 122, 65, 0.6);
        --green: #4ade80;
        --blue: #60a5fa;
        --border: #2a2a2a;
        --border-light: #333333;
      }

      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg-secondary);
        color: var(--text-primary);
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
        display: flex;
        justify-content: center;
        padding: 2rem 1rem;
        min-height: 100vh;
      }

      /* Terminal window */
      .terminal {
        max-width: 1100px;
        width: 100%;
        background: var(--bg-primary);
        border-radius: 12px;
        border: 1px solid var(--border);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-height: calc(100vh - 4rem);
      }

      /* Title bar */
      .titlebar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .dots {
        display: flex;
        gap: 8px;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .dot-red { background: #ff5f57; }
      .dot-yellow { background: #febc2e; }
      .dot-green { background: #28c840; }

      .titlebar-text {
        font-size: 13px;
        color: var(--text-secondary);
        flex: 1;
        text-align: center;
      }

      /* Volume selector */
      .volume-selector {
        display: flex;
        gap: 0;
        padding: 0 16px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .volume-btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        background: none;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }

      .volume-btn:hover {
        color: var(--text-primary);
      }

      .volume-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* Tab bar */
      .tab-bar {
        display: flex;
        gap: 2px;
        padding: 8px 16px;
        background: var(--bg-terminal);
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
        flex-shrink: 0;
      }

      .tab-bar::-webkit-scrollbar {
        height: 4px;
      }

      .tab-bar::-webkit-scrollbar-track {
        background: var(--bg-terminal);
      }

      .tab-bar::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .tab-btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        background: none;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
        border-radius: 4px;
        white-space: nowrap;
        transition: all 0.2s;
        flex-shrink: 0;
      }

      .tab-btn:hover {
        color: var(--text-secondary);
        background: rgba(255, 255, 255, 0.05);
      }

      .tab-btn.active {
        color: var(--accent);
        background: rgba(224, 122, 65, 0.1);
      }

      /* Content area */
      .content-area {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }

      .content-area::-webkit-scrollbar {
        width: 8px;
      }

      .content-area::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }

      .content-area::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      /* Tip content */
      .tip-content {
        display: none;
        animation: fadeIn 0.3s ease;
      }

      .tip-content.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .tip-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
      }

      .tip-num {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--accent);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        border-radius: 6px;
        flex-shrink: 0;
      }

      .tip-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--text-primary);
      }

      .tip-badge {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 4px;
        padding: 3px 8px;
        margin-left: auto;
        flex-shrink: 0;
      }

      .tip-body {
        font-family: "Inter", sans-serif;
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.8;
      }

      .tip-body p {
        margin-bottom: 12px;
      }

      .tip-body strong {
        color: var(--text-primary);
        font-weight: 600;
      }

      .tip-body ul {
        margin: 8px 0 16px 20px;
      }

      .tip-body li {
        margin-bottom: 6px;
      }

      .tip-body li::marker {
        color: var(--accent);
      }

      /* Code blocks */
      .code-block {
        background: var(--bg-code);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        margin: 12px 0;
        overflow-x: auto;
      }

      .code-block code {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.6;
        color: var(--text-primary);
      }

      .code-block .prompt {
        color: var(--green);
      }

      .code-block .cmd {
        color: var(--accent);
      }

      .code-block .comment {
        color: var(--text-muted);
      }

      /* Inline code */
      code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.9em;
        background: var(--bg-code);
        padding: 2px 6px;
        border-radius: 4px;
        color: var(--accent);
        border: 1px solid var(--border);
      }

      /* Highlight box (quote) */
      .highlight-box {
        border-left: 3px solid var(--accent);
        background: var(--accent-light);
        padding: 14px 18px;
        margin: 16px 0;
        border-radius: 0 8px 8px 0;
      }

      .highlight-box .label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 6px;
      }

      .highlight-box p {
        font-size: 14px;
        font-style: italic;
        color: var(--text-secondary);
        margin: 0;
      }

      .highlight-box cite {
        display: block;
        margin-top: 6px;
        font-style: normal;
        font-size: 12px;
        color: var(--text-muted);
      }

      /* Tables */
      .tip-table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0;
        font-size: 13px;
      }

      .tip-table th {
        text-align: left;
        padding: 8px 12px;
        background: var(--bg-code);
        border: 1px solid var(--border);
        font-weight: 600;
        font-size: 12px;
        color: var(--text-secondary);
        font-family: "JetBrains Mono", monospace;
      }

      .tip-table td {
        padding: 8px 12px;
        border: 1px solid var(--border);
        vertical-align: top;
        font-family: "Inter", sans-serif;
      }

      .tip-table td code {
        font-size: 12px;
      }

      /* Special tip */
      .tip-content.special .tip-num {
        background: #ef4444;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
        50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
      }

      /* Status bar */
      .statusbar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 8px 16px;
        background: var(--bg-secondary);
        border-top: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        animation: blink 2s ease-in-out infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      .statusbar a {
        color: var(--blue);
        text-decoration: none;
      }

      .statusbar a:hover {
        text-decoration: underline;
      }

      /* Install tab */
      .install-content {
        display: none;
        animation: fadeIn 0.3s ease;
      }

      .install-content.active {
        display: block;
      }

      .install-content h3 {
        font-size: 18px;
        margin-bottom: 12px;
        color: var(--text-primary);
      }

      .install-content p {
        font-family: "Inter", sans-serif;
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 16px;
        line-height: 1.7;
      }

      .install-cmd {
        position: relative;
        background: var(--bg-code);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        margin: 16px 0;
      }

      .install-cmd code {
        font-size: 13px;
        color: var(--green);
        background: none;
        border: none;
        padding: 0;
        word-break: break-all;
      }

      .copy-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--text-muted);
        background: var(--bg-primary);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 4px 10px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .copy-btn:hover {
        color: var(--text-primary);
        border-color: var(--text-muted);
      }

      .copy-btn.copied {
        color: var(--green);
        border-color: var(--green);
      }

      /* Responsive */
      @media (max-width: 768px) {
        body {
          padding: 0;
        }

        .terminal {
          border-radius: 0;
          max-height: 100vh;
          border: none;
        }

        .volume-btn {
          font-size: 11px;
          padding: 8px 12px;
        }

        .tab-btn {
          font-size: 11px;
          padding: 5px 8px;
        }

        .content-area {
          padding: 16px;
        }

        .tip-title {
          font-size: 16px;
        }

        .tip-body {
          font-size: 13px;
        }
      }
    </style>
  </head>

      let currentVolume = "v1";
      let currentTip = 0;

      function switchVolume(vol) {
        currentVolume = vol;
        currentTip = 0;

        document.querySelectorAll(".volume-btn").forEach((btn, i) => {
          btn.classList.toggle(
            "active",
            (vol === "v1" && i === 0) ||
              (vol === "v2" && i === 1) ||
              (vol === "install" && i === 2),
          );
        });

        if (vol === "install") {
          renderInstall();
        } else {
          renderTabs();
          renderTip();
        }
      }

      function renderTabs() {
        const tabBar = document.getElementById("tabBar");
        const data = tips[currentVolume];
        tabBar.innerHTML = data
          .map(
            (tip, i) =>
              `<button class="tab-btn ${i === currentTip ? "active" : ""}" onclick="selectTip(${i})">${tip.num} ${tip.title}</button>`,
          )
          .join("");
      }

      function selectTip(index) {
        currentTip = index;
        document.querySelectorAll(".tab-btn").forEach((btn, i) => {
          btn.classList.toggle("active", i === index);
        });
        renderTip();

        // Scroll active tab into view
        const activeTab = document.querySelector(".tab-btn.active");
        if (activeTab) {
          activeTab.scrollIntoView({
            behavior: "smooth",
            block: "nearest",
            inline: "center",
          });
        }
      }

      function renderTip() {
        const area = document.getElementById("contentArea");
        const tip = tips[currentVolume][currentTip];
        const isSpecial = tip.special ? "special" : "";

        area.innerHTML = `
          <div class="tip-content active ${isSpecial}">
            <div class="tip-header">
              <span class="tip-num">${tip.num}</span>
              <span class="tip-title">${tip.title}</span>
              ${tip.special ? '<span class="tip-badge">MOST IMPORTANT</span>' : ""}
            </div>
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 16px; font-family: 'JetBrains Mono', monospace;">
              ${tip.chapter}
            </div>
            <div class="tip-body">
              ${tip.body}
            </div>
          </div>
        `;
      }

      function renderInstall() {
        const tabBar = document.getElementById("tabBar");
        tabBar.innerHTML = "";

        const area = document.getElementById("contentArea");
        area.innerHTML = `
          <div class="install-content active">
            <h3>Install as a Skill</h3>
            <p>以下のコマンドでBorisの23 Tipsを Claude Code のスキルとしてインストールできる。インストール後は <code>/boris</code> コマンドで全tipsにアクセス可能。</p>
            <div class="install-cmd">
              <code id="installCode">mkdir -p ~/.claude/skills/boris && curl -L -o ~/.claude/skills/boris/SKILL.md https://howborisusesclaudecode.com/api/install</code>
              <button class="copy-btn" onclick="copyInstall(this)">Copy</button>
            </div>
            <p>インストール後、Claudeが会話中に関連するtipsを自動的にサーフェスしてくれるようになる。</p>
            <div class="highlight-box">
              <div class="label">Source</div>
              <p>Built by @CarolinaCherry using Claude Code. Based on <a href="https://x.com/bcherny/status/2007179832300581177" target="_blank" rel="noopener" style="color: var(--blue);">Boris Cherny's X threads</a>.</p>
            </div>
          </div>
        `;
      }

      function copyInstall(btn) {
        const code = document.getElementById("installCode").textContent;
        navigator.clipboard.writeText(code).then(() => {
          btn.textContent = "Copied!";
          btn.classList.add("copied");
          setTimeout(() => {
            btn.textContent = "Copy";
            btn.classList.remove("copied");
          }, 2000);
        });
      }

      // Keyboard navigation
      document.addEventListener("keydown", (e) => {
        if (currentVolume === "install") return;
        const data = tips[currentVolume];
        if (e.key === "ArrowRight" && currentTip < data.length - 1) {
          selectTip(currentTip + 1);
        } else if (e.key === "ArrowLeft" && currentTip > 0) {
          selectTip(currentTip - 1);
        }
      });

      // Initialize
      renderTabs();
      renderTip();
    </script>
