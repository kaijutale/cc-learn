# PRが作成・更新されたとき、変更ファイル一覧と行数統計を自動コメントする
name: PR Stats Comment

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR stats
        uses: actions/github-script@v7
        with:
          script: |
            // PRの変更ファイル情報を取得
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            // 統計を集計
            let totalAdditions = 0;
            let totalDeletions = 0;
            const fileList = files.map(f => {
              totalAdditions += f.additions;
              totalDeletions += f.deletions;
              const status = { added: '🆕', modified: '📝', removed: '🗑️', renamed: '📛' }[f.status] || '❓';
              return `| ${status} | \`${f.filename}\` | +${f.additions} | -${f.deletions} |`;
            });

            // コメント本文を作成
            const body = [
              '## 📊 PR Stats',
              '',
              `変更ファイル数: **${files.length}** | 追加: **+${totalAdditions}** | 削除: **-${totalDeletions}**`,
              '',
              '### 変更ファイル一覧',
              '| 状態 | ファイル | 追加 | 削除 |',
              '|:----:|:---------|-----:|-----:|',
              ...fileList,
              '',
              '---',
              '*🤖 Generated by GitHub Actions*',
            ].join('\n');

            // 既存のBotコメントを探す（sticky comment風）
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## 📊 PR Stats')
            );

            if (botComment) {
              // 既存コメントを更新
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              // 新規コメントを作成
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
